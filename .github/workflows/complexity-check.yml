name: Cyclomatic Complexity Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  complexity:
    name: Check Cyclomatic Complexity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # ESLint v10 の engines は ^20.19.0 || ^22.13.0 || >=24
          # actions/setup-node の "20" 指定は最新の 20.x を解決するため現状は通るが、
          # 将来の仕様変更で 20.19 未満が選ばれた場合に壊れるリスクがあるため明示化する
          node-version: '20.19'
          cache: 'npm'

      - name: Install dependencies
        # lint 専用のため install スクリプトは不要。
        # 悪意ある依存パッケージの post-install による任意コード実行を防ぐ。
        run: npm ci --ignore-scripts

      - name: Run ESLint complexity check
        run: npm run lint
        continue-on-error: false

      - name: Complexity check summary
        if: failure()
        run: |
          {
            echo "## Cyclomatic Complexity Check Failed"
            echo ""
            echo "Some functions exceed the maximum cyclomatic complexity of 10."
            echo ""
            echo "### Why does this matter?"
            echo "- Complexity 10 or less: 25% bug introduction rate"
            echo "- Complexity 40 or more: 50% bug introduction rate"
            echo "- Complexity 75 or more: 98% bug introduction rate"
            echo ""
            echo "Please refactor the flagged functions to reduce complexity."
          } >> "$GITHUB_STEP_SUMMARY"
