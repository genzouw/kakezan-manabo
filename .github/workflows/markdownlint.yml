name: markdownlint

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdownlint.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdownlint.yml'

concurrency:
  group: markdownlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    # 既存ドキュメントの MD040/MD031 違反を片付けるまでは赤検知にしない。
    # 整備完了後に continue-on-error を外して赤検知に切り替える。
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          # プロジェクト全体で Node.js 20.19 に統一（ESLint v10 の最低要件に合わせて）
          node-version: '20.19'

      - name: Install markdownlint-cli2
        # DavidAnson/markdownlint-cli2-action は allowed_actions に含まれない
        # third-party action のため、npm 経由で実行する。
        # --ignore-scripts で postinstall 経由の任意コード実行を防ぐ。
        run: npm install -g --no-fund --no-audit --ignore-scripts markdownlint-cli2@0.22.1

      - name: Run markdownlint-cli2
        run: markdownlint-cli2 --config .markdownlint-cli2.jsonc "**/*.md"
