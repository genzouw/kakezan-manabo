# CodeRabbit configuration
# https://docs.coderabbit.ai/reference/configuration

language: ja-JP
early_access: false
enable_free_tier: true

reviews:
  # 個人運営のためレビューはまず "chill" で緩めに始める。
  # 必要に応じて "assertive" に切り替えて検出感度を上げる。
  profile: chill

  # CodeRabbit を bot reviewer として動作させる。
  # 問題なしと判断した PR に対して Approve ステータスを返す。
  # 個人運営での self-merge 運用 (PR 作成者は自分の PR を承認できない GitHub 仕様)
  # を補助する目的で有効化。Approve は最終判断ではなく補助。
  request_changes_workflow: true

  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # 生成物 / 依存物 / ロックファイルなどはレビュー対象から除外する。
  path_filters:
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"
    - "!node_modules/**"
    - "!pnpm-lock.yaml"
    - "!package-lock.json"
    - "!yarn.lock"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/*.map"
    - "!**/*.snap"

  abort_on_close: true

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
